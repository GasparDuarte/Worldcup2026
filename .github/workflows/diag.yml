name: Diagnose football-data API
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Probe round 2
        env:
          FD_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          echo "================ STANDINGS RAW ================"
          curl -sS -H "X-Auth-Token: $FD_TOKEN" \
            "https://api.football-data.org/v4/competitions/WC/standings" -o /tmp/st.json
          jq -c '{season: .season.id, count: (.standings|length), first: .standings[0]}' /tmp/st.json | head -c 2000
          echo ""
          echo "--- group A table row sample ---"
          jq -c '.standings[] | select(.group=="GROUP_A" or .group=="Group A") | .table[0:2]' /tmp/st.json | head -c 1500
          echo ""
          sleep 8

          echo "================ CACHE-BUST PARAM TOLERANCE ================"
          curl -sS -w "HTTP %{http_code}\n" -H "X-Auth-Token: $FD_TOKEN" \
            "https://api.football-data.org/v4/competitions/WC/matches?nocache=$(date +%s)" -o /tmp/m.json
          jq -r '(.resultSet // .message // "no body") | tostring' /tmp/m.json | head -c 300
          echo ""
          sleep 8

          echo "================ SCORERS SHAPE ================"
          curl -sS -H "X-Auth-Token: $FD_TOKEN" \
            "https://api.football-data.org/v4/competitions/WC/scorers?limit=30" -o /tmp/sc.json
          jq -c '{count: (.scorers|length), first: .scorers[0], season: .season.id}' /tmp/sc.json | head -c 1200
          echo ""
